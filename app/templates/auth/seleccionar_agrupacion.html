{% extends 'base.html' %}
{% block title %}Seleccionar agrupación - GestMusica{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center align-items-center min-vh-100">
    <div class="col-12 col-sm-10 col-md-8 col-lg-6">
      <div class="card shadow-lg border-0">
        <div class="card-body p-4 p-md-5">
          <div class="text-center mb-4">
            <i class="fas fa-building fa-3x text-primary mb-3"></i>
            <h3 class="fw-bold">Selecciona una agrupación</h3>
            <p class="text-secondary">Hola, {{ identity.nombre }}. Elige con qué agrupación quieres entrar.</p>
          </div>

          <form method="POST" novalidate>
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <div class="d-grip gap-3">
              {% for m in memberships %}
              <button type="submit" name="tenant_id" value="{{ m.tenant_id }}"
                      class="btn btn-outline-primary text-start p-3 hover-lift">
                <div class="d-flex align-items-center justify-content-between">
                  <span>
                    <i class="fas fa-users me-2"></i>
                    <strong>{{ m.tenant.nombre }}</strong>
                  </span>
                  <i class="fas fa-chevron-right"></i>
                </div>
              </button>
              {% endfor %}
            </div>
          </form>

          <div class="text-center mt-4">
            <a href="{{ url_for('auth.logout') }}" class="text-secondary">
              <i class="fas fa-arrow-left me-1"></i> Volver al inicio de sesión
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
